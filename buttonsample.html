<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Beautiful Button</title>
<style>
  /* Body styling */
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: Arial, sans-serif;
  }

  /* Base button */
  .btn {
    position: relative;
    padding: 16px 50px;
    font-size: 20px;
    font-weight: bold;
    color: white;
    background: linear-gradient(45deg, #ff512f, #dd2476);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 20px rgba(255,81,47,0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    text-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }

  /* Hover effect */
  .btn:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 35px rgba(221,36,118,0.6);
  }

  /* Shine effect */
  .btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -150%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
      120deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.6) 50%,
      rgba(255,255,255,0) 100%
    );
    transform: skewX(-25deg);
  }

  .btn:hover::after {
    left: 200%;
    transition: left 0.8s ease;
  }

  /* Click effect (ripple) */
  .btn .ripple {
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%,-50%) scale(0);
    pointer-events: none;
    background: rgba(255,255,255,0.6);
    animation: rippleEffect 600ms linear forwards;
    z-index: 1;
  }

  @keyframes rippleEffect {
    to { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }

</style>
</head>
<body>

<button class="btn" id="fancyBtn">Hover Me ✨</button>

<script>
  // Ripple effect on click
  const btn = document.getElementById('fancyBtn');
  btn.addEventListener('click', function(e){
    const circle = document.createElement('span');
    circle.classList.add('ripple');
    const rect = this.getBoundingClientRect();
    circle.style.width = circle.style.height = Math.max(rect.width, rect.height) + 'px';
    circle.style.left = e.clientX - rect.left + 'px';
    circle.style.top = e.clientY - rect.top + 'px';
    this.appendChild(circle);
    circle.addEventListener('animationend', ()=> circle.remove());
  });
</script>

</body>
</html>
